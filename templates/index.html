<!DOCTYPE html>
<html lang="{{ lang.code }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ {{ ui.title if ui else 'Karmic Gochara' }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #0a0a08; --bg2: #111110; --gold: #c9a84c; --gold-dim: #8a6f2e;
  --gold-light: #e8c97a; --text: #e8e4d8; --text-dim: #8a8678;
  --text-muted: #4a4840; --border: #2a2820; --border-gold: rgba(201,168,76,0.2);
  --serif: 'Cormorant Garamond', Georgia, serif; --display: 'Cinzel', serif;
  --body: 'EB Garamond', Georgia, serif; --radius: 2px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--body);
  font-size: 18px; line-height: 1.7; min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(10,10,8,0.95), transparent);
}
.header-brand { font-family: var(--display); font-size: 0.75rem; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; }
#lang-select { background: transparent; border: 1px solid var(--border-gold); color: var(--gold); font-family: var(--display); font-size: 0.65rem; padding: 0.3rem; cursor: pointer; }
.hero { min-height: 80svh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 6rem 2rem 2rem; }
.hero-title { font-family: var(--display); font-size: clamp(2rem, 8vw, 3.5rem); margin-bottom: 0.5rem; }
.hero-title em { font-family: var(--serif); font-style: italic; color: var(--gold); }
#login-section { padding: 2rem 1.5rem; max-width: 420px; margin: 0 auto; }
.login-card { border: 1px solid var(--border-gold); padding: 2.5rem 2rem; background: rgba(17,17,16,0.8); backdrop-filter: blur(10px); }
.login-input { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 0.85rem; color: var(--text); margin-bottom: 1.5rem; }
.btn-row { display: flex; gap: 0.75rem; }
.btn-primary { flex: 1; background: var(--gold); color: var(--bg); border: none; padding: 0.85rem; cursor: pointer; font-family: var(--display); font-size: 0.65rem; text-transform: uppercase; }
.btn-secondary { flex: 1; background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 0.85rem; cursor: pointer; font-family: var(--display); font-size: 0.65rem; text-transform: uppercase; }
#app-section { display: none; padding: 6rem 0 4rem; }
.user-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
.date-section { padding: 0 1.5rem 2rem; }
.date-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); padding: 0.85rem; color: var(--text); color-scheme: dark; margin-bottom: 1rem; }
.btn-calculate { width: 100%; background: transparent; border: 1px solid var(--border-gold); color: var(--gold); padding: 1rem; cursor: pointer; font-family: var(--display); font-size: 0.65rem; text-transform: uppercase; }
.synthesis-section { padding: 0 1.5rem; }
.synthesis-content { font-family: var(--body); line-height: 1.9; }
.synthesis-content h2 { color: var(--gold); font-family: var(--display); font-size: 0.9rem; margin-top: 2rem; }
#loading-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,8,0.9); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.loading-sigil { width: 50px; height: 50px; animation: rotate 8s linear infinite; }
</style>
</head>
<body>

<header>
  <div class="header-brand">Karmic Gochara</div>
  <select id="lang-select" onchange="setLang(this.value)">
    {% for code, label in langs.items() %}
    <option value="{{ code }}" {% if code == lang.code %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</header>

<div id="loading-overlay">
  <svg class="loading-sigil" viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="30" stroke="#c9a84c" stroke-width="1" stroke-dasharray="4 4" /></svg>
  <div style="font-family: var(--display); font-size: 0.6rem; color: var(--gold);">{{ ui.calc_karmic if ui else 'Lecture des astres...' }}</div>
</div>

<div id="hero-section" style="{% if session_user %}display:none;{% endif %}">
  <section class="hero">
    <h1 class="hero-title">Ton <em>Karma</em><br>écrit dans les étoiles</h1>
    <p style="color: var(--text-dim); font-style: italic;">{{ ui.subtitle if ui else 'Astrologie Védique Sidérale' }}</p>
  </section>

  <section id="login-section">
    <div class="login-card">
      <input id="pseudo-input" class="login-input" type="text" placeholder="{{ ui.pseudo_ph if ui else 'Ton pseudo...' }}">
      <div class="btn-row">
        <button class="btn-primary" onclick="login()">{{ ui.login if ui else 'Connexion' }}</button>
        <button class="btn-secondary" onclick="register()">{{ ui.create_profile if ui else 'Créer' }}</button>
      </div>
      <div id="login-error" style="color: #c97a6b; font-size: 0.8rem; margin-top: 1rem; text-align: center;"></div>
    </div>
  </section>
</div>

<div id="app-section" style="{% if session_user %}display:block;{% endif %}">
  <div class="user-bar">
    <div class="user-name" id="display-pseudo" style="font-family: var(--display); color: var(--gold);">{{ session_user }}</div>
    <button onclick="logout()" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">{{ ui.logout if ui else 'Déconnexion' }}</button>
  </div>

  <div class="date-section">
    <input type="date" id="transit-date" class="date-input" value="{{ today_iso }}">
    <button class="btn-calculate" onclick="calculate()">✦ {{ ui.calculate if ui else 'Calculer' }}</button>
  </div>

  <div class="synthesis-section">
    <div id="synthesis-box" style="display:none;">
      <div class="synthesis-content" id="synthesis-content"></div>
      <button onclick="sendEmail()" style="margin-top:2rem; width:100%; padding:1rem; background:none; border:1px solid var(--border); color:var(--gold); cursor:pointer;">
        ✉ {{ ui.send_email if ui else 'Recevoir par email' }}
      </button>
    </div>
  </div>
</div>

<script>
let currentUser = "{{ session_user }}";

function setLang(code) {
  fetch('/set_lang', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({lang: code}) })
  .then(() => location.reload());
}

function login() {
  const pseudo = document.getElementById('pseudo-input').value.trim();
  if (!pseudo) return;
  showLoading(true);
  fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pseudo: pseudo}) })
  .then(r => r.json()).then(data => {
    showLoading(false);
    if (!data.ok) { document.getElementById('login-error').textContent = data.error; }
    else { location.reload(); }
  });
}

function register() {
  const pseudo = document.getElementById('pseudo-input').value.trim();
  if (!pseudo) return;
  showLoading(true);
  fetch('/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pseudo: pseudo}) })
  .then(r => r.json()).then(data => {
    showLoading(false);
    if (!data.ok) { document.getElementById('login-error').textContent = data.error; }
    else { location.reload(); }
  });
}

function logout() {
  fetch('/logout', { method: 'POST' }).then(() => location.reload());
}

function calculate() {
  const date = document.getElementById('transit-date').value;
  if (!date) return;
  showLoading(true);
  fetch('/calculate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ date: date, hour: 12, minute: 0 })
  })
  .then(r => r.json()).then(data => {
    showLoading(false);
    if (data.error) { alert(data.error); }
    else {
      document.getElementById('synthesis-content').innerHTML = marked.parse(data.synthesis);
      document.getElementById('synthesis-box').style.display = 'block';
    }
  });
}

function sendEmail() {
  const synthesis = document.getElementById('synthesis-content').innerText;
  const date = document.getElementById('transit-date').value;
  showLoading(true);
  fetch('/send_synthesis', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ synthesis: synthesis, date: date })
  })
  .then(r => r.json()).then(data => {
    showLoading(false);
    alert(data.ok ? "Email envoyé !" : "Erreur : " + data.error);
  });
}

function showLoading(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }
</script>
</body>
</html>
