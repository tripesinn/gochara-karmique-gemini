<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Réussi - Gochara Karmique</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 2rem;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #4A90E2;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Merci pour votre confiance !</p>
        <p>Mise à jour de votre profil en cours...</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');
            const plan = urlParams.get('plan');
            const pseudo = urlParams.get('pseudo');

            if (!sessionId || !plan || !pseudo) {
                // Si les paramètres sont manquants, rediriger vers l'accueil
                window.location.href = '/?payment=error';
                return;
            }

            try {
                const response = await fetch('/api/complete_payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, plan: plan, pseudo: pseudo })
                });

                if (!response.ok) {
                    throw new Error('La validation du paiement a échoué.');
                }

                // Le serveur a mis à jour le profil.
                // On redirige vers l'accueil, où l'utilisateur sera connecté
                // avec son nouveau statut.
                window.location.href = '/?payment=success';

            } catch (error) {
                console.error('Erreur lors de la validation du paiement:', error);
                window.location.href = '/?payment=error';
            }
        });
    </script>
</body>
</html>
